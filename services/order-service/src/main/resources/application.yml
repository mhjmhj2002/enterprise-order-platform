spring:
  application:
    name: order-service
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/order}
    username: ${ORDER_DB_USERNAME:order}
    password: ${ORDER_DB_PASSWORD:order}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: ${SERVER_PORT:8083}
management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    kafka:
      enabled: false
order:
  payment:
    fake:
      fail: ${PAYMENT_FAKE_FAIL:false}
  integrations:
    inventory:
      base-url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
      default-warehouse-id: ${ORDER_DEFAULT_WAREHOUSE_ID:00000000-0000-0000-0000-000000000001}
