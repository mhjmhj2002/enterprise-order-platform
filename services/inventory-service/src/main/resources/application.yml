spring:
  application:
    name: inventory-service
  datasource:
    url: ${INVENTORY_DB_URL:jdbc:postgresql://localhost:5432/inventory}
    username: ${INVENTORY_DB_USERNAME:inventory}
    password: ${INVENTORY_DB_PASSWORD:inventory}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8082}
management:
  endpoints:
    web:
      exposure:
        include: health

security:
  api:
    username: ${SECURITY_API_USERNAME}
    password: ${SECURITY_API_PASSWORD}
