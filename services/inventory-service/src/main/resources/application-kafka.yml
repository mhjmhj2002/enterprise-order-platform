spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    admin:
      fail-fast: false
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:mercadoaurora.inventory.v1}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.mercadoaurora.inventory.infrastructure.event.OrderConfirmedEventEnvelope
        spring.json.trusted.packages: com.mercadoaurora.inventory.infrastructure.event
        spring.json.use.type.headers: false
    listener:
      ack-mode: record
management:
  health:
    kafka:
      enabled: true
app:
  order-confirmation-recovery:
    fixed-delay-ms: ${ORDER_CONFIRMATION_RECOVERY_FIXED_DELAY_MS:5000}
    batch-size: ${ORDER_CONFIRMATION_RECOVERY_BATCH_SIZE:25}
